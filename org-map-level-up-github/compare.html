<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>⛽ مقارنة نسختين من الهيكل</title>
  <style>
    body{margin:0;background:radial-gradient(circle at top,#172554 0%,#0f172a 45%,#020617 100%);color:#fff;font-family:Arial,sans-serif}
    .wrap{max-width:1200px;margin:0 auto;padding:28px}
    .hero,.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:26px;padding:22px;box-shadow:0 18px 40px rgba(0,0,0,.22);margin-bottom:18px}
    h1,h2{margin-top:0}.hint{color:#cbd5e1;line-height:1.8}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    input,button{font-family:inherit}
    input{width:100%;padding:14px;border-radius:16px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:#fff;margin-top:10px}
    button{border:none;border-radius:16px;padding:14px 18px;background:#f97316;color:#fff;font-weight:800;cursor:pointer}
    .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:14px 0}
    .stat{border:1px solid rgba(255,255,255,.10);border-radius:18px;background:rgba(255,255,255,.045);padding:15px;text-align:center}
    .stat .n{font-size:26px;font-weight:900;color:#fdba74}.stat .l{color:#cbd5e1;font-size:13px}
    .list{display:grid;gap:10px}
    .item{border:1px solid rgba(255,255,255,.10);border-radius:16px;background:rgba(255,255,255,.045);padding:12px;line-height:1.7}
    .item b{color:#fed7aa}
    @media(max-width:800px){.grid,.summary{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>مقارنة نسختين من الهيكل التنظيمي</h1>
    <div class="hint">ارفع ملفين data.js: نسخة قديمة ونسخة جديدة. الأداة تعرض الموظفين/العناصر المضافة والمحذوفة وتغيّرات الرواتب والتبعية.</div>
  </div>
  <div class="grid">
    <div class="card"><h2>النسخة القديمة</h2><input type="file" id="oldFile" accept=".js,.txt,.json"></div>
    <div class="card"><h2>النسخة الجديدة</h2><input type="file" id="newFile" accept=".js,.txt,.json"></div>
  </div>
  <button id="compareBtn">قارن الآن</button>
  <div id="result"></div>
</div>
<script>
function money(n){return new Intl.NumberFormat("ar-SA",{style:"currency",currency:"SAR",maximumFractionDigits:0}).format(n||0)}
async function readData(file){
  const text = await file.text();
  let code = text.replace(/^\s*const\s+data\s*=/, 'data =');
  const fn = new Function(code + '; return data;');
  return fn();
}
function computeCost(node){return (node.station?0:Number(node.salary||0)) + (node.children||[]).reduce((s,c)=>s+computeCost(c),0)}
function flatten(root){
  const out = new Map();
  function walk(node,parent='',path=[]){
    const p=[...path,node.name||'-'];
    const key=node.name||p.join('>');
    out.set(key,{name:node.name||'-',subtitle:node.subtitle||'',salary:Number(node.salary||0),parent,path:p.join(' › '),cost:computeCost(node),type:node.type||'',station:!!node.station});
    (node.children||[]).forEach(c=>walk(c,node.name||'',p));
  }
  walk(root);
  return out;
}
document.getElementById('compareBtn').addEventListener('click',async()=>{
  const oldF=document.getElementById('oldFile').files[0], newF=document.getElementById('newFile').files[0];
  if(!oldF||!newF){alert('اختر الملفين أولاً');return}
  const oldD=await readData(oldF), newD=await readData(newF);
  const oldM=flatten(oldD.company), newM=flatten(newD.company);
  const added=[], removed=[], salaryChanged=[], parentChanged=[];
  newM.forEach((v,k)=>{if(!oldM.has(k)) added.push(v); else {
    const o=oldM.get(k);
    if(o.salary!==v.salary) salaryChanged.push({name:v.name,old:o.salary,new:v.salary,path:v.path});
    if(o.parent!==v.parent) parentChanged.push({name:v.name,old:o.parent,new:v.parent,path:v.path});
  }});
  oldM.forEach((v,k)=>{if(!newM.has(k)) removed.push(v)});
  const totalOld=computeCost(oldD.company), totalNew=computeCost(newD.company);
  function list(title,arr,mapper){
    return `<div class="card"><h2>${title}</h2><div class="list">${arr.length?arr.map(mapper).join(''):'<div class="item">لا يوجد</div>'}</div></div>`;
  }
  document.getElementById('result').innerHTML = `
    <div class="summary">
      <div class="stat"><div class="n">${added.length}</div><div class="l">مضاف</div></div>
      <div class="stat"><div class="n">${removed.length}</div><div class="l">محذوف</div></div>
      <div class="stat"><div class="n">${salaryChanged.length}</div><div class="l">تغير راتب</div></div>
      <div class="stat"><div class="n">${money(totalNew-totalOld)}</div><div class="l">فرق الإجمالي</div></div>
    </div>
    ${list('العناصر المضافة',added,x=>`<div class="item"><b>${x.name}</b><br>${x.path}</div>`)}
    ${list('العناصر المحذوفة',removed,x=>`<div class="item"><b>${x.name}</b><br>${x.path}</div>`)}
    ${list('تغيّرات الرواتب',salaryChanged,x=>`<div class="item"><b>${x.name}</b><br>${money(x.old)} ← ${money(x.new)}<br>${x.path}</div>`)}
    ${list('تغيّرات التبعية',parentChanged,x=>`<div class="item"><b>${x.name}</b><br>${x.old||'-'} ← ${x.new||'-'}<br>${x.path}</div>`)}
  `;
});
</script>
</body>
</html>
