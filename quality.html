<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>⛽ فحص البيانات</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    :root{
      --bg:#0f172a;
      --bg2:#0a1020;
      --panel:rgba(255,255,255,.05);
      --panel-strong:rgba(255,255,255,.07);
      --line:rgba(255,255,255,.22);
      --txt:#fff;
      --muted:#cbd5e1;
      --green:rgba(16,185,129,.14); --greenb:rgba(16,185,129,.38);
      --blue:rgba(14,165,233,.14); --blueb:rgba(14,165,233,.38);
      --amber:rgba(245,158,11,.14); --amberb:rgba(245,158,11,.38);
      --slate:rgba(148,163,184,.14); --slateb:rgba(148,163,184,.38);
      --dark:rgba(255,255,255,.04);
      --purple:rgba(168,85,247,.14); --purpleb:rgba(168,85,247,.35);
      --shadow:0 18px 40px rgba(0,0,0,.22);
      --radius:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:radial-gradient(circle at top,#16233b 0%,var(--bg) 42%,var(--bg2) 100%);
      color:var(--txt);
      font-family:"Sakkal Majalla","Segoe UI",Tahoma,Arial,sans-serif;
    }
    .wrap{max-width:2100px;margin:0 auto;padding:24px}
    .hero{
      background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.04));
      border:1px solid rgba(255,255,255,.12);
      border-radius:30px;
      padding:30px;
      text-align:center;
      margin-bottom:28px;
      box-shadow:0 20px 45px rgba(0,0,0,.28)
    }
    .logo-shell{
      width:186px;
      height:126px;
      margin:0 auto 20px;
      border-radius:30px;
      background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.04));
      border:1px solid rgba(251,146,60,.22);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px 20px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.10),
        0 20px 40px rgba(0,0,0,.24);
      backdrop-filter:blur(10px);
    }
    .logo-shell img{
      width:100%;
      height:100%;
      object-fit:contain;
      filter:drop-shadow(0 10px 18px rgba(0,0,0,.18));
      image-rendering:auto;
    }
    .hero h1{margin:0 0 10px;font-size:44px;letter-spacing:.3px}
    .hero p{margin:0;color:var(--muted);font-size:18px}
    .top-tools{
      margin-top:22px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .search-box{
      min-width:320px;
      max-width:520px;
      width:min(520px,90vw);
      background:var(--panel-strong);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:0 14px;
      display:flex;
      align-items:center;
      gap:10px;
      height:52px;
      box-shadow:var(--shadow);
    }
    .search-box input{
      flex:1;
      background:transparent;
      border:none;
      outline:none;
      color:var(--txt);
      font-size:16px;
    }
    .search-box input::placeholder{color:#9fb0c9}
    .btn{
      height:52px;
      border:none;
      border-radius:18px;
      padding:0 18px;
      color:var(--txt);
      background:var(--panel-strong);
      border:1px solid rgba(255,255,255,.12);
      cursor:pointer;
      font-size:15px;
      box-shadow:var(--shadow);
    }
    .btn:hover{transform:translateY(-1px)}

    .icon-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-width:126px;
      padding:0 16px;
      position:relative;
      overflow:hidden;
    }
    .icon-btn::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,0));
      opacity:.75;
      pointer-events:none;
    }
    .icon-btn:hover .css-icon{
      transform:scale(1.07);
    }
    #expandAllBtn .css-icon{color:#fed7aa}
    #expandAllBtn:hover .css-icon{color:#fdba74}
    .btn-label{
      position:relative;
      z-index:1;
      white-space:nowrap;
    }
    .css-icon{
      width:22px;
      height:22px;
      position:relative;
      display:inline-block;
      flex:0 0 22px;
      color:#dbeafe;
      z-index:1;
      transition:transform .15s ease;
    }
    .icon-search{
      border:2px solid currentColor;
      border-radius:50%;
      width:18px;
      height:18px;
      margin-inline-start:2px;
      opacity:.9;
    }
    .icon-search::after{
      content:"";
      position:absolute;
      width:9px;
      height:2px;
      background:currentColor;
      border-radius:99px;
      transform:rotate(45deg);
      left:-6px;
      bottom:-4px;
      opacity:.9;
    }
    .icon-expand::before{
      content:"";
      position:absolute;
      left:4px;
      right:4px;
      top:2px;
      bottom:2px;
      border:2px solid currentColor;
      border-radius:6px;
      background:
        linear-gradient(currentColor,currentColor) 50% 34% / 56% 2px no-repeat,
        linear-gradient(currentColor,currentColor) 50% 52% / 56% 2px no-repeat,
        linear-gradient(currentColor,currentColor) 50% 70% / 42% 2px no-repeat;
      opacity:.95;
      box-shadow:0 0 12px rgba(219,234,254,.10);
    }
    .icon-expand::after{
      content:"";
      position:absolute;
      right:3px;
      top:2px;
      width:7px;
      height:7px;
      border-inline-start:2px solid currentColor;
      border-bottom:2px solid currentColor;
      border-bottom-left-radius:3px;
      background:rgba(255,255,255,.08);
      transform:skew(-8deg);
      opacity:.9;
    }
    .icon-focus::before{
      content:"";
      position:absolute;
      inset:2px;
      border:2px solid currentColor;
      border-radius:6px;
      clip-path:polygon(0 0,42% 0,42% 16%,16% 16%,16% 42%,0 42%,0 0,58% 0,100% 0,100% 42%,84% 42%,84% 16%,58% 16%,58% 0,100% 58%,100% 100%,58% 100%,58% 84%,84% 84%,84% 58%,100% 58%,42% 100%,0 100%,0 58%,16% 58%,16% 84%,42% 84%,42% 100%);
    }
    .icon-collapse::before{
      content:"";
      position:absolute;
      inset:3px;
      border:2px solid currentColor;
      border-radius:6px;
      opacity:.9;
    }
    .icon-collapse::after{
      content:"";
      position:absolute;
      left:5px;
      right:5px;
      top:10px;
      height:2px;
      background:currentColor;
      border-radius:99px;
      box-shadow:0 -5px 0 currentColor,0 5px 0 currentColor;
      opacity:.9;
    }
    .icon-focus::before{
      border-color:#93c5fd;
      box-shadow:0 0 14px rgba(147,197,253,.25);
    }
    .icon-focus::after{
      content:"";
      position:absolute;
      inset:8px;
      border-radius:50%;
      background:#93c5fd;
      box-shadow:0 0 12px rgba(147,197,253,.75);
      opacity:.9;
    }
    .icon-clear::before,
    .icon-clear::after{
      content:"";
      position:absolute;
      left:4px;
      right:4px;
      top:10px;
      height:2px;
      background:#fecaca;
      border-radius:99px;
    }
    .icon-clear::before{transform:rotate(45deg)}
    .icon-clear::after{transform:rotate(-45deg)}

    .metrics{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
      margin-top:24px;
    }
    .metric{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.1);
      border-radius:20px;
      padding:16px;
      text-align:center;
      box-shadow:0 10px 20px rgba(0,0,0,.14)
    }
    .metric .label{color:var(--muted);font-size:14px}
    .metric .value{margin-top:10px;font-size:28px;font-weight:700;color:#a7f3d0}

    .tree{display:flex;flex-direction:column;align-items:center;padding-top:8px}
    .node{display:flex;flex-direction:column;align-items:center; margin:4px 0}
    .children{display:none;flex-direction:column;align-items:center}
    .node.open>.children{display:flex}
    .card{
      min-width:230px;max-width:360px;padding:18px 20px;border-radius:var(--radius);
      border:1px solid rgba(255,255,255,.12);background:var(--panel);
      text-align:center;box-shadow:var(--shadow);
      transition:transform .15s ease,border-color .15s ease, box-shadow .15s ease, opacity .15s ease;
    }
    button.card{cursor:pointer}
    .card:hover{transform:translateY(-1px)}
    .primary{background:var(--green);border-color:var(--greenb)}
    .secondary{background:var(--blue);border-color:var(--blueb)}
    .warning{background:var(--amber);border-color:var(--amberb)}
    .vacant{background:var(--slate);border-color:var(--slateb)}
    .dark{background:var(--dark)}
    .purple{background:var(--purple);border-color:var(--purpleb)}
    .title{font-size:25px;font-weight:800;line-height:1.35}
    .sub{font-size:15px;color:var(--muted);margin-top:8px;line-height:1.6}
    .hint{font-size:12px;color:#94a3b8;margin-top:10px}
    .amount{color:#86efac;margin-top:10px;font-weight:700;font-size:18px}
    .vline{width:2px;height:28px;background:var(--line)}
    .single-col{display:flex;flex-direction:column;align-items:center;gap:6px}
    .multi-wrap{display:flex;flex-direction:column;align-items:center;width:100%;min-width:max-content}
    .multi-topline{height:2px;background:var(--line);width:100%}
    .multi-branches{display:flex;justify-content:center;align-items:flex-start;gap:18px;flex-wrap:nowrap;max-width:none;padding-top:0}
    .branch-slot{display:flex;flex-direction:column;align-items:center}
    .branch-slot .vline{height:24px}
    .cwrap{width:min(1550px,96vw);display:flex;flex-direction:column;align-items:center}
    .cconnect{width:100%;display:grid;grid-template-columns:1fr 1fr 1fr;gap:70px;margin-bottom:10px}
    .cconnect .slot{display:flex;justify-content:center}
    .crow{width:100%;display:grid;grid-template-columns:1fr 1fr 1fr;gap:70px;align-items:start}
    .footnote{margin-top:16px;color:#93c5fd;font-size:13px;text-align:center}
    .hidden-by-search{display:none !important}
    .match .card{
      border-color:#7dd3fc !important;
      box-shadow:0 0 0 1px rgba(125,211,252,.35), 0 18px 40px rgba(0,0,0,.24);
    }


    .desktop-only{display:inline-flex;align-items:center;justify-content:center}
    body:fullscreen{
      background:radial-gradient(circle at top,#16233b 0%,var(--bg) 42%,var(--bg2) 100%);
    }
    body.focus-mode .hero{
      margin-bottom:18px;
    }
    body.focus-mode .wrap{
      max-width:2400px;
      padding:18px 24px 32px;
    }
    body.focus-mode .footnote{
      display:none;
    }


    .wrap{
      position:relative;
    }
    .wrap::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 18% 12%,rgba(16,185,129,.12),transparent 28%),
        radial-gradient(circle at 82% 18%,rgba(14,165,233,.10),transparent 30%),
        radial-gradient(circle at 50% 100%,rgba(245,158,11,.07),transparent 35%);
      opacity:.9;
      z-index:-1;
    }
    .hero{
      position:relative;
      overflow:hidden;
    }
    .hero::before{
      content:"";
      position:absolute;
      inset:-1px;
      background:
        linear-gradient(110deg,transparent 0%,rgba(255,255,255,.10) 45%,transparent 60%);
      transform:translateX(70%);
      opacity:.45;
      pointer-events:none;
    }
    .hero::after{
      content:"";
      position:absolute;
      left:50%;
      bottom:-80px;
      width:520px;
      height:180px;
      transform:translateX(-50%);
      background:radial-gradient(circle,rgba(16,185,129,.12),transparent 65%);
      pointer-events:none;
    }
    .logo-shell{
      position:relative;
      overflow:hidden;
    }
    .logo-shell::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      background:linear-gradient(135deg,rgba(255,255,255,.16),transparent 42%,rgba(255,255,255,.06));
      pointer-events:none;
    }
    .top-tools{
      background:rgba(255,255,255,.035);
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      padding:12px;
      width:max-content;
      max-width:100%;
      margin-inline:auto;
      box-shadow:0 16px 36px rgba(0,0,0,.18);
      backdrop-filter:blur(12px);
    }
    .search-box{
      transition:border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }
    .search-box:focus-within{
      border-color:rgba(125,211,252,.42);
      box-shadow:0 0 0 1px rgba(125,211,252,.16),0 18px 40px rgba(0,0,0,.20);
      background:rgba(255,255,255,.09);
    }
    .btn{
      transition:transform .15s ease,border-color .15s ease,background .15s ease,box-shadow .15s ease;
    }
    .btn:hover{
      border-color:rgba(125,211,252,.32);
      background:rgba(255,255,255,.10);
      box-shadow:0 18px 42px rgba(0,0,0,.24),0 0 0 1px rgba(125,211,252,.08);
    }
    .btn:active{
      transform:translateY(0) scale(.98);
    }
    .metric{
      position:relative;
      overflow:hidden;
      transition:transform .18s ease,border-color .18s ease,background .18s ease;
    }
    .metric::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,rgba(255,255,255,.07),transparent);
      pointer-events:none;
    }
    .metric:hover{
      transform:translateY(-2px);
      border-color:rgba(167,243,208,.20);
      background:rgba(255,255,255,.06);
    }
    .card{
      position:relative;
      overflow:hidden;
    }
    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,rgba(255,255,255,.075),transparent 58%);
      opacity:.75;
      pointer-events:none;
    }
    .card::after{
      content:"";
      position:absolute;
      inset:1px;
      border-radius:calc(var(--radius) - 1px);
      border:1px solid rgba(255,255,255,.035);
      pointer-events:none;
    }
    .card:hover{
      border-color:rgba(255,255,255,.20);
      box-shadow:0 24px 52px rgba(0,0,0,.28),0 0 0 1px rgba(255,255,255,.035);
    }
    .title,.sub,.hint,.amount{
      position:relative;
      z-index:1;
    }
    .amount{
      display:inline-flex;
      justify-content:center;
      align-items:center;
      padding:5px 10px;
      border-radius:999px;
      background:rgba(16,185,129,.10);
      border:1px solid rgba(16,185,129,.16);
    }
    .vline,.multi-topline{
      background:linear-gradient(180deg,transparent,rgba(255,255,255,.32),transparent);
    }
    .multi-topline{
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.32),transparent);
    }
    .node.open > .card .hint{
      color:#bfdbfe;
    }
    .match > .card{
      animation:pulseMatch 1.5s ease-in-out infinite;
    }
    @keyframes pulseMatch{
      0%,100%{box-shadow:0 0 0 1px rgba(125,211,252,.28),0 18px 40px rgba(0,0,0,.24)}
      50%{box-shadow:0 0 0 2px rgba(125,211,252,.44),0 20px 46px rgba(0,0,0,.28)}
    }

    .brand-showcase{
      position:relative;
      margin:14px auto 0;
      width:max-content;
      max-width:100%;
      padding:12px 18px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.12);
      background:
        linear-gradient(135deg,rgba(255,128,0,.18),rgba(255,255,255,.035) 45%,rgba(255,128,0,.10));
      box-shadow:
        0 18px 38px rgba(0,0,0,.22),
        0 0 32px rgba(255,128,0,.08);
      overflow:hidden;
    }
    .brand-showcase::before{
      content:"";
      position:absolute;
      inset:-2px;
      background:linear-gradient(90deg,transparent,rgba(255,167,38,.28),transparent);
      transform:translateX(70%);
      opacity:.75;
      pointer-events:none;
    }
    .company-name{
      position:relative;
      z-index:1;
      font-size:20px;
      font-weight:800;
      letter-spacing:.2px;
      color:#fff7ed;
      text-shadow:
        0 0 16px rgba(255,128,0,.35),
        0 2px 12px rgba(0,0,0,.22);
    }
    .developer-credit{
      position:relative;
      z-index:1;
      margin-top:7px;
      font-size:13px;
      color:#fed7aa;
      text-shadow:0 0 14px rgba(255,180,100,.28);
    }
    .developer-credit::after{
      content:"";
      display:block;
      width:62%;
      height:1px;
      margin:7px auto 0;
      background:linear-gradient(90deg,transparent,rgba(251,146,60,.75),transparent);
      box-shadow:0 0 12px rgba(251,146,60,.45);
    }

    body.focus-mode .top-tools{
      position:sticky;
      top:14px;
      z-index:20;
    }



    .salary-placeholder{
      display:none;
      margin-top:10px;
      font-size:28px;
      font-weight:700;
      color:#fed7aa;
      text-shadow:0 0 14px rgba(249,115,22,.18);
    }
    body.hide-salaries .salary-placeholder{
      display:block;
    }

    /* Salary visibility */
    body.hide-salaries .amount,
    body.hide-salaries .salary-sensitive{
      display:none !important;
    }
    .icon-eye::before{
      content:"";
      position:absolute;
      left:2px;
      right:2px;
      top:6px;
      height:10px;
      border:2px solid currentColor;
      border-radius:999px 999px 999px 999px / 80% 80% 80% 80%;
      transform:skewX(-10deg);
      opacity:.95;
    }
    .icon-eye::after{
      content:"";
      position:absolute;
      width:7px;
      height:7px;
      border-radius:50%;
      background:currentColor;
      left:7px;
      top:8px;
      box-shadow:0 0 10px rgba(219,234,254,.45);
    }
    body.hide-salaries .icon-eye::before,
    body.hide-salaries .icon-eye::after{
      background:transparent;
    }
    body.hide-salaries .icon-eye::before{
      border-color:#fecaca;
    }
    body.hide-salaries .icon-eye::after{
      content:"";
      position:absolute;
      left:3px;
      right:3px;
      top:10px;
      width:auto;
      height:2px;
      border-radius:99px;
      background:#fecaca;
      transform:rotate(-35deg);
      box-shadow:none;
    }

    /* Details panel */
    .details-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.34);
      backdrop-filter:blur(3px);
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease;
      z-index:70;
    }
    .details-panel{
      position:fixed;
      top:18px;
      bottom:18px;
      inset-inline-end:18px;
      width:min(430px,calc(100vw - 36px));
      transform:translateX(-18px);
      opacity:0;
      pointer-events:none;
      z-index:80;
      border-radius:28px;
      border:1px solid rgba(249,115,22,.22);
      background:
        linear-gradient(180deg,rgba(255,255,255,.105),rgba(255,255,255,.055)),
        radial-gradient(circle at top right,rgba(249,115,22,.12),transparent 46%);
      box-shadow:
        0 30px 70px rgba(0,0,0,.38),
        0 0 40px rgba(249,115,22,.08);
      backdrop-filter:blur(18px);
      overflow:hidden;
      transition:opacity .18s ease,transform .18s ease;
    }
    body.details-open .details-backdrop{
      opacity:1;
      pointer-events:auto;
    }
    body.details-open .details-panel{
      opacity:1;
      pointer-events:auto;
      transform:translateX(0);
    }
    .details-header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:14px;
      padding:22px 22px 16px;
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    .details-eyebrow{
      color:#fdba74;
      font-size:13px;
      margin-bottom:7px;
      letter-spacing:.2px;
    }
    .details-header h2{
      margin:0;
      font-size:24px;
      line-height:1.35;
    }
    .details-close{
      width:38px;
      height:38px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      color:#fff;
      font-size:24px;
      cursor:pointer;
    }
    .details-body{
      padding:18px 22px 22px;
      display:grid;
      gap:12px;
      max-height:calc(100vh - 130px);
      overflow:auto;
    }
    .detail-row{
      display:flex;
      justify-content:space-between;
      gap:14px;
      align-items:center;
      padding:12px 13px;
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      background:rgba(255,255,255,.04);
    }
    .detail-row .k{
      color:#cbd5e1;
      font-size:13px;
    }
    .detail-row .v{
      text-align:left;
      font-weight:700;
      color:#fff;
      line-height:1.45;
    }
    .detail-note{
      padding:13px;
      border-radius:16px;
      background:rgba(249,115,22,.08);
      border:1px solid rgba(249,115,22,.15);
      color:#fed7aa;
      line-height:1.6;
    }
    .card{
      user-select:none;
    }


    .card{
      position:relative;
    }
    .details-trigger{
      position:absolute;
      top:9px;
      inset-inline-start:9px;
      width:24px;
      height:24px;
      border-radius:999px;
      border:1px solid rgba(254,215,170,.34);
      background:rgba(15,23,42,.42);
      color:#fed7aa;

<script>

function initAppMenu(activePage){
  const btn=document.getElementById('appMenuBtn');
  const backdrop=document.getElementById('appMenuBackdrop');
  document.querySelectorAll('.drawer-link').forEach(a=>a.classList.toggle('active',a.dataset.page===activePage));
  function close(){document.body.classList.remove('menu-open')}
  btn?.addEventListener('click',()=>document.body.classList.toggle('menu-open'));
  backdrop?.addEventListener('click',close);
  document.addEventListener('keydown',e=>{if(e.key==='Escape') close();});
}


function money(n){return new Intl.NumberFormat("ar-SA-u-nu-latn",{style:"currency",currency:"SAR",maximumFractionDigits:0}).format(n||0)}

function isVacantNode(node){
  const status = String(node.status || '').trim().toLowerCase();
  const tone = String(node.tone || '').trim().toLowerCase();
  return status === 'vacant' || status === 'شاغر' || tone === 'vacant';
}

function computeCost(node){const self=(node.station||isVacantNode(node))?0:Number(node.salary||0);return self+(node.children||[]).reduce((s,c)=>s+computeCost(c),0)}
function flattenNodes(root){
  const out=[];
  function walk(node,parent=null,depth=0,path=[]){
    const current=[...path,node.name||'-'];
    out.push({node,parent,depth,path:current});
    (node.children||[]).forEach(c=>walk(c,node,depth+1,current));
  }
  walk(root);
  return out;
}
function countStationWorkers(node){return Number(node.station_workers||0)+(node.children||[]).reduce((s,c)=>s+countStationWorkers(c),0)}
function isExecutive(node){
  if(isVacantNode(node)) return false;
  const name=String(node.name||'').trim().toUpperCase();
  return node.type==='c_level'||['CEO','CFO','COO'].includes(name);
}
function isAreaOrRegionalOrSupervisor(node){
  const name=String(node.name||'');
  const t=String(node.type||'');
  return ['regional_manager','area_manager','station_supervisor'].includes(t)
    || name.includes('مدير منطقة')
    || name.includes('مدير اقليمي')
    || name.includes('مدير إقليمي')
    || name.includes('مشرف محطة');
}
function isManager(node){
  if(isVacantNode(node)) return false;
  const name=String(node.name||'');
  const sub=String(node.subtitle||'').toLowerCase();
  if(isExecutive(node) || isAreaOrRegionalOrSupervisor(node)) return false;
  if(node.type==='manager') return true;
  if(name.startsWith('مدير ') || name.includes(' مدير ')) return true;
  if(sub.includes('manager')) return true;
  return false;
}
function isWorkerGroup(node){
  const name=String(node.name||'');
  const sub=String(node.subtitle||'').toLowerCase();
  return node.type==='worker'||name.includes('عمالة')||name.includes('عامل')||sub.includes('staff')||sub.includes('worker');
}
function isPerson(node){
  return !isVacantNode(node) && !!Number(node.salary||0) && !node.station;
}
function countDepartments(){
  return flattenNodes(data.company).filter(x => {
    const n=x.node;
    const name=String(n.name||'');
    return ['department','division','executive_root'].includes(n.type)
      || (!n.salary && !n.station && (n.children||[]).length && (
        name.includes('ادارة') || name.includes('إدارة') || name.includes('قسم') ||
        name.includes('المالية') || name.includes('الرواتب') || name.includes('الخزينة') ||
        name.includes('المحاسبة') || name.includes('الموارد')
      ));
  }).length;
}
function dashboardMetrics(){
  const flat=flattenNodes(data.company);
  return {
    allEmployees: flat.filter(x=>isPerson(x.node)).length,
    departments: countDepartments(),
    managers: flat.filter(x=>isManager(x.node)).length,
    executives: flat.filter(x=>isExecutive(x.node)).length,
    leasedStations: flat.filter(x=>x.node.station && (x.node.station_kind||x.node.stationType||'leased')==='leased').length,
    operatedStations: flat.filter(x=>x.node.station && (x.node.station_kind||x.node.stationType)==='operated').length,
    franchiseStations: flat.filter(x=>x.node.station && (x.node.station_kind||x.node.stationType)==='franchise').length,
    topCost: flat.filter(x=>(x.node.children||[]).length>0).map(x=>({name:x.node.name||'-',cost:computeCost(x.node),path:x.path.join(' › ')})).filter(x=>x.cost>0).sort((a,b)=>b.cost-a.cost).slice(0,5),
    quality: analyzeDataQuality(),
    meta: data.meta||{}
  };
}
function analyzeDataQuality(){
  const items=[];
  const nameMap=new Map();
  function add(level,title,path,detail){items.push({level,title,path,detail})}
  function walk(node,path=[]){
    const p=[...path,node.name||'-'];
    const name=String(node.name||'').trim();
    if(!name) add('error','عنصر بدون اسم',p.join(' › '),'يجب تعبئة الاسم.');
    if(name){if(!nameMap.has(name)) nameMap.set(name,[]); nameMap.get(name).push(p.join(' › '));}
    if(isPerson(node) && !Number(node.salary||0) && !node.station){
      add('warning','راتب غير مدخل',p.join(' › '),'هذا العنصر يبدو كشخص وله راتب غير مدخل.');
    }
    if(node.station){
      if(!Number(node.station_workers||0)) add('warning','محطة بدون عدد عمال',p.join(' › '),'يفضل تعبئة عدد عمال المحطة.');
      if(!(node.children||[]).length) add('warning','محطة بدون مشرف أو عمالة',p.join(' › '),'تكلفة المحطة تعتمد على التابعين تحتها.');
    }
    (node.children||[]).forEach(c=>walk(c,p));
  }
  walk(data.company);
  nameMap.forEach((paths,name)=>{if(paths.length>1) add('warning','اسم مكرر',name,`تكرر الاسم ${paths.length} مرات.`)});
  return items;
}


function personNationalityGroup(node){
  const g = String(node.nationality_group || node.nationality || '').trim().toLowerCase();
  if(['saudi','سعودي','ksa','sa'].includes(g)) return 'saudi';
  if(['non_saudi','non-saudi','nonsaudi','غير سعودي','غير_سعودي','expat'].includes(g)) return 'non_saudi';
  return 'unknown';
}
function analyzeSaudizationQuality(){
  const flat = flattenNodes(data.company);
  const people = flat.filter(x => isPerson(x.node));
  const missingNationality = people.filter(x => personNationalityGroup(x.node) === 'unknown');
  const missingSalary = people.filter(x => !Number(x.node.salary || 0));
  const saudi = people.filter(x => personNationalityGroup(x.node) === 'saudi');
  const nonSaudi = people.filter(x => personNationalityGroup(x.node) === 'non_saudi');
  const departmentWarnings = [];

  flat.forEach(x => {
    const n = x.node;
    const isOrgUnit = n.is_cost_center === true || ['department','division'].includes(n.type);
    if(!isOrgUnit) return;
    const subPeople = flattenNodes(n).filter(y => isPerson(y.node));
    if(!subPeople.length) return;
    const missing = subPeople.filter(y => personNationalityGroup(y.node) === 'unknown');
    if(missing.length){
      departmentWarnings.push({
        name: n.name || '-',
        path: x.path.join(' › '),
        missing: missing.length,
        total: subPeople.length
      });
    }
  });

  return {people, missingNationality, missingSalary, saudi, nonSaudi, departmentWarnings};
}
function renderSaudizationQuality(){
  const summaryEl = document.getElementById('saudizationQualitySummary');
  const listEl = document.getElementById('saudizationQualityList');
  if(!summaryEl || !listEl) return;

  const q = analyzeSaudizationQuality();
  const classified = q.saudi.length + q.nonSaudi.length;
  const ratio = classified ? Math.round((q.saudi.length / classified) * 100) : 0;

  summaryEl.innerHTML = `
    <div class="saudization-quality-card"><div class="n">${q.saudi.length}</div><div class="l">سعوديون</div></div>
    <div class="saudization-quality-card"><div class="n">${q.nonSaudi.length}</div><div class="l">غير سعوديين</div></div>
    <div class="saudization-quality-card"><div class="n">${q.missingNationality.length}</div><div class="l">بلا تصنيف جنسية</div></div>
    <div class="saudization-quality-card"><div class="n">${ratio}%</div><div class="l">نسبة السعوديين من المصنفين</div></div>
  `;

  const issues = [];
  q.missingNationality.forEach(x => {
    issues.push({
      level:'warning',
      title:'موظف بدون تصنيف جنسية',
      detail:'هذا الموظف لن يدخل بشكل صحيح في تحليلات السعودة حتى يتم تحديد الجنسية.',
      path:x.path.join(' › ')
    });
  });
  q.missingSalary.forEach(x => {
    issues.push({
      level:'warning',
      title:'موظف بدون راتب',
      detail:'تكلفة السعودة ستكون ناقصة إذا لم يتم إدخال الراتب.',
      path:x.path.join(' › ')
    });
  });
  q.departmentWarnings.forEach(x => {
    issues.push({
      level:'info',
      title:'إدارة/قسم يحتوي موظفين بلا جنسية',
      detail:`${x.missing} من ${x.total} موظف/موظفين تحت هذا النطاق بلا تصنيف جنسية.`,
      path:x.path
    });
  });

  listEl.innerHTML = issues.length ? issues.map(i => `
    <div class="issue ${i.level}">
      <b>${i.title}</b><br>
      ${i.detail}
      <div class="path">${i.path}</div>
    </div>
  `).join('') : '<div class="issue"><b>بيانات السعودة مكتملة مبدئيًا</b><br>لا توجد ملاحظات سعودة واضحة.</div>';
}

initAppMenu('quality');
function renderQualityVersion(){
  const meta = data.meta || {};
  const el = document.getElementById('qualityVersionCard');
  if(!el) return;
  el.innerHTML = `
    <div><b>الإصدار:</b> ${meta.version || 'v1.0'}</div>
    <div><b>آخر تحديث:</b> ${meta.lastUpdated || '-'}</div>
    <div><b>ملاحظات:</b> ${meta.notes || ''}</div>
  `;
}
renderQualityVersion();
renderSaudizationQuality();
const items = analyzeDataQuality();
const errors = items.filter(i=>i.level==='error').length;
const warnings = items.filter(i=>i.level==='warning').length;
const infos = items.filter(i=>i.level==='info').length;
document.getElementById('qualitySummary').innerHTML = `
  <div class="quality-card"><div class="n">${errors}</div><div class="l">أخطاء</div></div>
  <div class="quality-card"><div class="n">${warnings}</div><div class="l">تحذيرات</div></div>
  <div class="quality-card"><div class="n">${infos}</div><div class="l">ملاحظات</div></div>
`;
document.getElementById('qualityList').innerHTML = items.length ? items.map(i=>`
  <div class="issue ${i.level}">
    <b>${i.title}</b><br>
    ${i.detail}
    <div class="path">${i.path}</div>
  </div>
`).join('') : '<div class="issue"><b>لا توجد تنبيهات واضحة</b><br>البيانات تبدو جيدة مبدئيًا.</div>';
</script>
