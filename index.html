<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>⛽ الخارطة التنظيمية التفاعلية</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2288%22>⛽</text></svg>">
  <style>
    :root{
      --bg:#0f172a;
      --bg2:#0a1020;
      --panel:rgba(255,255,255,.05);
      --panel-strong:rgba(255,255,255,.07);
      --line:rgba(255,255,255,.22);
      --txt:#fff;
      --muted:#cbd5e1;
      --green:rgba(16,185,129,.14); --greenb:rgba(16,185,129,.38);
      --blue:rgba(14,165,233,.14); --blueb:rgba(14,165,233,.38);
      --amber:rgba(245,158,11,.14); --amberb:rgba(245,158,11,.38);
      --slate:rgba(148,163,184,.14); --slateb:rgba(148,163,184,.38);
      --dark:rgba(255,255,255,.04);
      --purple:rgba(168,85,247,.14); --purpleb:rgba(168,85,247,.35);
      --shadow:0 18px 40px rgba(0,0,0,.22);
      --radius:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:radial-gradient(circle at top,#16233b 0%,var(--bg) 42%,var(--bg2) 100%);
      color:var(--txt);
      font-family:Arial,sans-serif;
    }
    .wrap{max-width:2100px;margin:0 auto;padding:24px}
    .hero{
      background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.04));
      border:1px solid rgba(255,255,255,.12);
      border-radius:30px;
      padding:30px;
      text-align:center;
      margin-bottom:28px;
      box-shadow:0 20px 45px rgba(0,0,0,.28)
    }
    .logo-shell{
      width:186px;
      height:126px;
      margin:0 auto 20px;
      border-radius:30px;
      background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.04));
      border:1px solid rgba(251,146,60,.22);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px 20px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.10),
        0 20px 40px rgba(0,0,0,.24);
      backdrop-filter:blur(10px);
    }
    .logo-shell img{
      width:100%;
      height:100%;
      object-fit:contain;
      filter:drop-shadow(0 10px 18px rgba(0,0,0,.18));
      image-rendering:auto;
    }
    .hero h1{margin:0 0 10px;font-size:44px;letter-spacing:.3px}
    .hero p{margin:0;color:var(--muted);font-size:18px}
    .top-tools{
      margin-top:22px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .search-box{
      min-width:320px;
      max-width:520px;
      width:min(520px,90vw);
      background:var(--panel-strong);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:0 14px;
      display:flex;
      align-items:center;
      gap:10px;
      height:52px;
      box-shadow:var(--shadow);
    }
    .search-box input{
      flex:1;
      background:transparent;
      border:none;
      outline:none;
      color:var(--txt);
      font-size:16px;
    }
    .search-box input::placeholder{color:#9fb0c9}
    .btn{
      height:52px;
      border:none;
      border-radius:18px;
      padding:0 18px;
      color:var(--txt);
      background:var(--panel-strong);
      border:1px solid rgba(255,255,255,.12);
      cursor:pointer;
      font-size:15px;
      box-shadow:var(--shadow);
    }
    .btn:hover{transform:translateY(-1px)}

    .icon-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-width:126px;
      padding:0 16px;
      position:relative;
      overflow:hidden;
    }
    .icon-btn::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,0));
      opacity:.75;
      pointer-events:none;
    }
    .icon-btn:hover .css-icon{
      transform:scale(1.07);
    }
    #expandAllBtn .css-icon{color:#fed7aa}
    #expandAllBtn:hover .css-icon{color:#fdba74}
    .btn-label{
      position:relative;
      z-index:1;
      white-space:nowrap;
    }
    .css-icon{
      width:22px;
      height:22px;
      position:relative;
      display:inline-block;
      flex:0 0 22px;
      color:#dbeafe;
      z-index:1;
      transition:transform .15s ease;
    }
    .icon-search{
      border:2px solid currentColor;
      border-radius:50%;
      width:18px;
      height:18px;
      margin-inline-start:2px;
      opacity:.9;
    }
    .icon-search::after{
      content:"";
      position:absolute;
      width:9px;
      height:2px;
      background:currentColor;
      border-radius:99px;
      transform:rotate(45deg);
      left:-6px;
      bottom:-4px;
      opacity:.9;
    }
    .icon-expand::before{
      content:"";
      position:absolute;
      left:4px;
      right:4px;
      top:2px;
      bottom:2px;
      border:2px solid currentColor;
      border-radius:6px;
      background:
        linear-gradient(currentColor,currentColor) 50% 34% / 56% 2px no-repeat,
        linear-gradient(currentColor,currentColor) 50% 52% / 56% 2px no-repeat,
        linear-gradient(currentColor,currentColor) 50% 70% / 42% 2px no-repeat;
      opacity:.95;
      box-shadow:0 0 12px rgba(219,234,254,.10);
    }
    .icon-expand::after{
      content:"";
      position:absolute;
      right:3px;
      top:2px;
      width:7px;
      height:7px;
      border-inline-start:2px solid currentColor;
      border-bottom:2px solid currentColor;
      border-bottom-left-radius:3px;
      background:rgba(255,255,255,.08);
      transform:skew(-8deg);
      opacity:.9;
    }
    .icon-focus::before{
      content:"";
      position:absolute;
      inset:2px;
      border:2px solid currentColor;
      border-radius:6px;
      clip-path:polygon(0 0,42% 0,42% 16%,16% 16%,16% 42%,0 42%,0 0,58% 0,100% 0,100% 42%,84% 42%,84% 16%,58% 16%,58% 0,100% 58%,100% 100%,58% 100%,58% 84%,84% 84%,84% 58%,100% 58%,42% 100%,0 100%,0 58%,16% 58%,16% 84%,42% 84%,42% 100%);
    }
    .icon-collapse::before{
      content:"";
      position:absolute;
      inset:3px;
      border:2px solid currentColor;
      border-radius:6px;
      opacity:.9;
    }
    .icon-collapse::after{
      content:"";
      position:absolute;
      left:5px;
      right:5px;
      top:10px;
      height:2px;
      background:currentColor;
      border-radius:99px;
      box-shadow:0 -5px 0 currentColor,0 5px 0 currentColor;
      opacity:.9;
    }
    .icon-focus::before{
      border-color:#93c5fd;
      box-shadow:0 0 14px rgba(147,197,253,.25);
    }
    .icon-focus::after{
      content:"";
      position:absolute;
      inset:8px;
      border-radius:50%;
      background:#93c5fd;
      box-shadow:0 0 12px rgba(147,197,253,.75);
      opacity:.9;
    }
    .icon-clear::before,
    .icon-clear::after{
      content:"";
      position:absolute;
      left:4px;
      right:4px;
      top:10px;
      height:2px;
      background:#fecaca;
      border-radius:99px;
    }
    .icon-clear::before{transform:rotate(45deg)}
    .icon-clear::after{transform:rotate(-45deg)}

    .metrics{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
      margin-top:24px;
    }
    .metric{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.1);
      border-radius:20px;
      padding:16px;
      text-align:center;
      box-shadow:0 10px 20px rgba(0,0,0,.14)
    }
    .metric .label{color:var(--muted);font-size:14px}
    .metric .value{margin-top:10px;font-size:28px;font-weight:700;color:#a7f3d0}

    .tree{display:flex;flex-direction:column;align-items:center;padding-top:8px}
    .node{display:flex;flex-direction:column;align-items:center; margin:4px 0}
    .children{display:none;flex-direction:column;align-items:center}
    .node.open>.children{display:flex}
    .card{
      min-width:230px;max-width:360px;padding:18px 20px;border-radius:var(--radius);
      border:1px solid rgba(255,255,255,.12);background:var(--panel);
      text-align:center;box-shadow:var(--shadow);
      transition:transform .15s ease,border-color .15s ease, box-shadow .15s ease, opacity .15s ease;
    }
    button.card{cursor:pointer}
    .card:hover{transform:translateY(-1px)}
    .primary{background:var(--green);border-color:var(--greenb)}
    .secondary{background:var(--blue);border-color:var(--blueb)}
    .warning{background:var(--amber);border-color:var(--amberb)}
    .vacant{background:var(--slate);border-color:var(--slateb)}
    .dark{background:var(--dark)}
    .purple{background:var(--purple);border-color:var(--purpleb)}
    .title{font-size:25px;font-weight:800;line-height:1.35}
    .sub{font-size:15px;color:var(--muted);margin-top:8px;line-height:1.6}
    .hint{font-size:12px;color:#94a3b8;margin-top:10px}
    .amount{color:#86efac;margin-top:10px;font-weight:700;font-size:18px}
    .vline{width:2px;height:28px;background:var(--line)}
    .single-col{display:flex;flex-direction:column;align-items:center;gap:6px}
    .multi-wrap{display:flex;flex-direction:column;align-items:center;width:100%;min-width:max-content}
    .multi-topline{height:2px;background:var(--line);width:100%}
    .multi-branches{display:flex;justify-content:center;align-items:flex-start;gap:18px;flex-wrap:nowrap;max-width:none;padding-top:0}
    .branch-slot{display:flex;flex-direction:column;align-items:center}
    .branch-slot .vline{height:24px}
    .cwrap{width:min(1550px,96vw);display:flex;flex-direction:column;align-items:center}
    .cconnect{width:100%;display:grid;grid-template-columns:1fr 1fr 1fr;gap:70px;margin-bottom:10px}
    .cconnect .slot{display:flex;justify-content:center}
    .crow{width:100%;display:grid;grid-template-columns:1fr 1fr 1fr;gap:70px;align-items:start}
    .footnote{margin-top:16px;color:#93c5fd;font-size:13px;text-align:center}
    .hidden-by-search{display:none !important}
    .match .card{
      border-color:#7dd3fc !important;
      box-shadow:0 0 0 1px rgba(125,211,252,.35), 0 18px 40px rgba(0,0,0,.24);
    }


    .desktop-only{display:inline-flex;align-items:center;justify-content:center}
    body:fullscreen{
      background:radial-gradient(circle at top,#16233b 0%,var(--bg) 42%,var(--bg2) 100%);
    }
    body.focus-mode .hero{
      margin-bottom:18px;
    }
    body.focus-mode .wrap{
      max-width:2400px;
      padding:18px 24px 32px;
    }
    body.focus-mode .footnote{
      display:none;
    }


    .wrap{
      position:relative;
    }
    .wrap::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 18% 12%,rgba(16,185,129,.12),transparent 28%),
        radial-gradient(circle at 82% 18%,rgba(14,165,233,.10),transparent 30%),
        radial-gradient(circle at 50% 100%,rgba(245,158,11,.07),transparent 35%);
      opacity:.9;
      z-index:-1;
    }
    .hero{
      position:relative;
      overflow:hidden;
    }
    .hero::before{
      content:"";
      position:absolute;
      inset:-1px;
      background:
        linear-gradient(110deg,transparent 0%,rgba(255,255,255,.10) 45%,transparent 60%);
      transform:translateX(70%);
      opacity:.45;
      pointer-events:none;
    }
    .hero::after{
      content:"";
      position:absolute;
      left:50%;
      bottom:-80px;
      width:520px;
      height:180px;
      transform:translateX(-50%);
      background:radial-gradient(circle,rgba(16,185,129,.12),transparent 65%);
      pointer-events:none;
    }
    .logo-shell{
      position:relative;
      overflow:hidden;
    }
    .logo-shell::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      background:linear-gradient(135deg,rgba(255,255,255,.16),transparent 42%,rgba(255,255,255,.06));
      pointer-events:none;
    }
    .top-tools{
      background:rgba(255,255,255,.035);
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      padding:12px;
      width:max-content;
      max-width:100%;
      margin-inline:auto;
      box-shadow:0 16px 36px rgba(0,0,0,.18);
      backdrop-filter:blur(12px);
    }
    .search-box{
      transition:border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }
    .search-box:focus-within{
      border-color:rgba(125,211,252,.42);
      box-shadow:0 0 0 1px rgba(125,211,252,.16),0 18px 40px rgba(0,0,0,.20);
      background:rgba(255,255,255,.09);
    }
    .btn{
      transition:transform .15s ease,border-color .15s ease,background .15s ease,box-shadow .15s ease;
    }
    .btn:hover{
      border-color:rgba(125,211,252,.32);
      background:rgba(255,255,255,.10);
      box-shadow:0 18px 42px rgba(0,0,0,.24),0 0 0 1px rgba(125,211,252,.08);
    }
    .btn:active{
      transform:translateY(0) scale(.98);
    }
    .metric{
      position:relative;
      overflow:hidden;
      transition:transform .18s ease,border-color .18s ease,background .18s ease;
    }
    .metric::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,rgba(255,255,255,.07),transparent);
      pointer-events:none;
    }
    .metric:hover{
      transform:translateY(-2px);
      border-color:rgba(167,243,208,.20);
      background:rgba(255,255,255,.06);
    }
    .card{
      position:relative;
      overflow:hidden;
    }
    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,rgba(255,255,255,.075),transparent 58%);
      opacity:.75;
      pointer-events:none;
    }
    .card::after{
      content:"";
      position:absolute;
      inset:1px;
      border-radius:calc(var(--radius) - 1px);
      border:1px solid rgba(255,255,255,.035);
      pointer-events:none;
    }
    .card:hover{
      border-color:rgba(255,255,255,.20);
      box-shadow:0 24px 52px rgba(0,0,0,.28),0 0 0 1px rgba(255,255,255,.035);
    }
    .title,.sub,.hint,.amount{
      position:relative;
      z-index:1;
    }
    .amount{
      display:inline-flex;
      justify-content:center;
      align-items:center;
      padding:5px 10px;
      border-radius:999px;
      background:rgba(16,185,129,.10);
      border:1px solid rgba(16,185,129,.16);
    }
    .vline,.multi-topline{
      background:linear-gradient(180deg,transparent,rgba(255,255,255,.32),transparent);
    }
    .multi-topline{
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.32),transparent);
    }
    .node.open > .card .hint{
      color:#bfdbfe;
    }
    .match > .card{
      animation:pulseMatch 1.5s ease-in-out infinite;
    }
    @keyframes pulseMatch{
      0%,100%{box-shadow:0 0 0 1px rgba(125,211,252,.28),0 18px 40px rgba(0,0,0,.24)}
      50%{box-shadow:0 0 0 2px rgba(125,211,252,.44),0 20px 46px rgba(0,0,0,.28)}
    }

    .brand-showcase{
      position:relative;
      margin:14px auto 0;
      width:max-content;
      max-width:100%;
      padding:12px 18px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.12);
      background:
        linear-gradient(135deg,rgba(255,128,0,.18),rgba(255,255,255,.035) 45%,rgba(255,128,0,.10));
      box-shadow:
        0 18px 38px rgba(0,0,0,.22),
        0 0 32px rgba(255,128,0,.08);
      overflow:hidden;
    }
    .brand-showcase::before{
      content:"";
      position:absolute;
      inset:-2px;
      background:linear-gradient(90deg,transparent,rgba(255,167,38,.28),transparent);
      transform:translateX(70%);
      opacity:.75;
      pointer-events:none;
    }
    .company-name{
      position:relative;
      z-index:1;
      font-size:20px;
      font-weight:800;
      letter-spacing:.2px;
      color:#fff7ed;
      text-shadow:
        0 0 16px rgba(255,128,0,.35),
        0 2px 12px rgba(0,0,0,.22);
    }
    .developer-credit{
      position:relative;
      z-index:1;
      margin-top:7px;
      font-size:13px;
      color:#fed7aa;
      text-shadow:0 0 14px rgba(255,180,100,.28);
    }
    .developer-credit::after{
      content:"";
      display:block;
      width:62%;
      height:1px;
      margin:7px auto 0;
      background:linear-gradient(90deg,transparent,rgba(251,146,60,.75),transparent);
      box-shadow:0 0 12px rgba(251,146,60,.45);
    }

    body.focus-mode .top-tools{
      position:sticky;
      top:14px;
      z-index:20;
    }

    @media (max-width:1100px){
      .crow,.cconnect{grid-template-columns:1fr;gap:24px}
      .metrics{grid-template-columns:repeat(2,1fr)}
      .hero h1{font-size:34px}
      .multi-branches{flex-wrap:wrap}
      .multi-topline{display:none}
      .branch-slot .vline{display:none}
    }
    @media (max-width:640px){
      .metrics{grid-template-columns:1fr}
      .logo-shell{width:150px;height:100px;padding:14px 16px}
      .logo-shell img{width:100%;height:100%}
      .search-box{min-width:unset;width:100%}
      .btn{width:100%}
      .top-tools{flex-direction:column}
      .desktop-only{display:none !important}
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="logo-shell">
      <img src="logo.png" alt="Company Logo" onerror="this.style.display='none'">
    </div>
    <h1>الخارطة التنظيمية التفاعلية</h1>
    <div class="brand-showcase">
      <div class="company-name">شركة تطوير محطات الوقود للمحروقات - أورانج</div>
      <div class="developer-credit">تم تطويره بواسطة المهندس/ علي حسين الحنابي</div>
    </div>

    <div class="top-tools">
      <div class="search-box">
        <span class="css-icon icon-search" aria-hidden="true"></span>
        <input id="searchInput" type="text" placeholder="ابحث عن إدارة أو موظف أو منصب" />
      </div>
      <button class="btn icon-btn" id="expandAllBtn" title="فتح الكل">
        <span class="css-icon icon-expand" aria-hidden="true"></span>
        <span class="btn-label">فتح الكل</span>
      </button>
      <button class="btn icon-btn" id="collapseAllBtn" title="طي الكل">
        <span class="css-icon icon-collapse" aria-hidden="true"></span>
        <span class="btn-label">طي الكل</span>
      </button>
      <button class="btn icon-btn desktop-only" id="focusModeBtn" title="وضع التركيز">
        <span class="css-icon icon-focus" aria-hidden="true"></span>
        <span class="btn-label">وضع التركيز</span>
      </button>
      <button class="btn icon-btn" id="clearSearchBtn" title="مسح البحث">
        <span class="css-icon icon-clear" aria-hidden="true"></span>
        <span class="btn-label">مسح البحث</span>
      </button>
    </div>

    <div class="metrics">
      <div class="metric"><div class="label">إجمالي رواتب الشركة</div><div class="value" id="metric-total-cost">-</div></div>
      <div class="metric"><div class="label">عدد المحطات</div><div class="value" id="metric-stations">-</div></div>
      <div class="metric"><div class="label">عدد العاملين بالمحطات</div><div class="value" id="metric-station-workers">-</div></div>
      <div class="metric"><div class="label">عدد الموظفين الإداريين</div><div class="value" id="metric-admin-employees">-</div></div>
    </div>
  </div>

  <div class="tree" id="tree"></div>
  <div class="footnote">© شركة تطوير محطات الوقود للمحروقات - أورانج</div>
</div>

<script src="data.js"></script>
<script>

function money(n){
  return new Intl.NumberFormat("ar-SA",{style:"currency",currency:"SAR",maximumFractionDigits:0}).format(n || 0);
}
function computeCost(node){
  const self = Number(node.salary || 0);
  return self + (node.children || []).reduce((s, child) => s + computeCost(child), 0);
}
function countStations(node){
  return (node.station ? 1 : 0) + (node.children || []).reduce((s, child) => s + countStations(child), 0);
}
function countStationWorkers(node){
  return Number(node.station_workers || 0) + (node.children || []).reduce((s, child) => s + countStationWorkers(child), 0);
}
function countAdminEmployees(node){
  const self = node.salary && !node.station ? 1 : 0;
  return self + (node.children || []).reduce((s, child) => s + countAdminEmployees(child), 0);
}

function createCard(node, clickable){
  const el = document.createElement(clickable ? "button" : "div");
  el.className = `card ${node.tone || "dark"}`;
  const total = computeCost(node);
  const searchText = [node.name, node.subtitle || ""].join(" ").trim().toLowerCase();
  el.dataset.search = searchText;
  el.innerHTML = `
    <div class="title">${node.name}</div>
    ${node.subtitle ? `<div class="sub">${node.subtitle}</div>` : ``}
    ${total > 0 ? `<div class="amount">${money(total)}</div>` : ``}
    ${clickable ? `<div class="hint">اضغط للتوسعة أو الإخفاء</div>` : ``}
  `;
  return el;
}

function renderChildren(children, layout){
  const wrap = document.createElement("div");
  wrap.className = "children";
  const vline = document.createElement("div");
  vline.className = "vline";
  wrap.appendChild(vline);

  if(children.length === 1 || layout === "vertical"){
    const col = document.createElement("div");
    col.className = "single-col";
    children.forEach(child => col.appendChild(renderNode(child)));
    wrap.appendChild(col);
    return wrap;
  }

  const multiWrap = document.createElement("div");
  multiWrap.className = "multi-wrap";

  const topline = document.createElement("div");
  topline.className = "multi-topline";
  multiWrap.appendChild(topline);

  const branches = document.createElement("div");
  branches.className = "multi-branches";

  children.forEach(child => {
    const slot = document.createElement("div");
    slot.className = "branch-slot";
    const down = document.createElement("div");
    down.className = "vline";
    slot.appendChild(down);
    slot.appendChild(renderNode(child));
    branches.appendChild(slot);
  });

  multiWrap.appendChild(branches);
  wrap.appendChild(multiWrap);
  return wrap;
}

function renderNode(node){
  const hasChildren = Array.isArray(node.children) && node.children.length > 0;
  const isExecutiveRoot = node.type === "executive_root";
  const el = document.createElement("div");
  el.className = "node";

  const card = createCard(node, hasChildren);
  el.appendChild(card);

  if(hasChildren){
    let childrenWrap;
    if(isExecutiveRoot){
      childrenWrap = document.createElement("div");
      childrenWrap.className = "children";

      const vline = document.createElement("div");
      vline.className = "vline";
      childrenWrap.appendChild(vline);

      const cwrap = document.createElement("div");
      cwrap.className = "cwrap";
      cwrap.innerHTML = `
        <div class="multi-topline"></div>
        <div class="cconnect">
          <div class="slot"><div class="vline"></div></div>
          <div class="slot"><div class="vline"></div></div>
          <div class="slot"><div class="vline"></div></div>
        </div>
      `;
      const crow = document.createElement("div");
      crow.className = "crow";
      node.children.forEach(child => {
        const holder = document.createElement("div");
        holder.className = "branch";
        holder.appendChild(renderNode(child));
        crow.appendChild(holder);
      });
      cwrap.appendChild(crow);
      childrenWrap.appendChild(cwrap);
    } else {
      childrenWrap = renderChildren(node.children, node.layout || "vertical");
    }
    el.appendChild(childrenWrap);
    card.addEventListener("click", () => el.classList.toggle("open"));
  }
  return el;
}

const treeRoot = renderNode(data.company);
treeRoot.classList.add("open");
document.getElementById("tree").appendChild(treeRoot);

const firstChildNode = treeRoot.querySelector(":scope > .children .node");
if(firstChildNode){ firstChildNode.classList.add("open"); }

document.getElementById("metric-total-cost").textContent = money(computeCost(data.company));
document.getElementById("metric-stations").textContent = countStations(data.company);
document.getElementById("metric-station-workers").textContent = countStationWorkers(data.company);
document.getElementById("metric-admin-employees").textContent = countAdminEmployees(data.company);

function setAllNodes(openState){
  document.querySelectorAll('.tree .node').forEach((node, idx) => {
    if(idx === 0 || idx === 1){
      node.classList.add('open');
    } else {
      node.classList.toggle('open', openState);
    }
  });
}
document.getElementById('expandAllBtn').addEventListener('click', () => setAllNodes(true));
document.getElementById('collapseAllBtn').addEventListener('click', () => setAllNodes(false));

function applySearch(query){
  const q = query.trim().toLowerCase();
  const nodes = Array.from(document.querySelectorAll('.tree .node'));
  nodes.forEach(node => {
    node.classList.remove('match', 'hidden-by-search');
  });

  if(!q){
    return;
  }

  nodes.forEach(node => {
    const card = node.querySelector(':scope > .card');
    const text = (card?.dataset.search || '').toLowerCase();
    if(text.includes(q)){
      node.classList.add('match');
      let current = node;
      while(current){
        if(current.classList && current.classList.contains('node')){
          current.classList.add('open');
        }
        current = current.parentElement?.closest('.node');
      }
    }
  });

  nodes.forEach(node => {
    const hasMatchedDescendant = node.querySelector('.match') !== null;
    const isMatch = node.classList.contains('match');
    if(!isMatch && !hasMatchedDescendant){
      node.classList.add('hidden-by-search');
    }
  });
}
const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', (e) => applySearch(e.target.value));
document.getElementById('clearSearchBtn').addEventListener('click', () => {
  searchInput.value = '';
  applySearch('');
});

const focusModeBtn = document.getElementById('focusModeBtn');
function isDesktopScreen(){
  return window.matchMedia('(min-width: 900px)').matches;
}
function updateFocusButton(){
  if(!focusModeBtn) return;
  const label = focusModeBtn.querySelector('.btn-label');
  const text = document.fullscreenElement ? 'إنهاء التركيز' : 'وضع التركيز';
  if(label) label.textContent = text;
  focusModeBtn.title = text;
}
if(focusModeBtn){
  focusModeBtn.addEventListener('click', async () => {
    if(!isDesktopScreen()){
      return;
    }
    try{
      if(!document.fullscreenElement){
        await document.documentElement.requestFullscreen();
        document.body.classList.add('focus-mode');
      }else{
        await document.exitFullscreen();
        document.body.classList.remove('focus-mode');
      }
      updateFocusButton();
    }catch(error){
      alert('المتصفح منع تشغيل وضع التركيز. جرّب فتح الصفحة من HTTPS أو GitHub Pages.');
    }
  });
}
document.addEventListener('fullscreenchange', () => {
  document.body.classList.toggle('focus-mode', !!document.fullscreenElement);
  updateFocusButton();
});
window.addEventListener('resize', () => {
  if(!isDesktopScreen() && document.fullscreenElement){
    document.exitFullscreen().catch(() => {});
  }
});

</script>
